name: 数据库备份

on:
  schedule:
    # 每天北京时间上午 10 点执行（UTC 2:00）
    - cron: '0 2 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: 备份数据库
        env:
          DB_HOST: db.wjrsfmaniumwjrrgljpb.supabase.co
          DB_PORT: 5432
          DB_NAME: postgres
          DB_USER: postgres
          DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          DATE=$(date +%Y%m%d)
          mkdir -p backups

          # 导出所有表（结构 + 数据）
          PGPASSWORD=$DB_PASSWORD pg_dump \
            -h $DB_HOST \
            -p $DB_PORT \
            -U $DB_USER \
            -d $DB_NAME \
            --no-owner \
            --no-acl \
            > backups/${DATE}.sql

          # 删除 7 天前的旧备份
          find backups/ -name "*.sql" -mtime +7 -delete

      - name: 提交备份到仓库
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --staged --quiet || git commit -m "备份: $(date +%Y-%m-%d)"
          git push
